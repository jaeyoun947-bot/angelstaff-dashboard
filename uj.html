<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>엔젤스태프 · 의정부성모병원 근무 만족도 조사</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap">

<style>
  :root{
    --ink:#0B1430; --ink-2:#2A3556;
    --brand:#1B3FA0; --brand-2:#3B6BF0; --glow:#5B8CFF; --mint:#10B981;
    --bg:#FBFCFE; --surface:#FFFFFF; --line:#E4E8F2; --line-2:#EEF1F8;
    --muted:#5E6A86; --muted-2:#9AA3BC;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    --ease:cubic-bezier(.22,.7,.18,1);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans);
    line-height:1.6; letter-spacing:-0.012em; -webkit-font-smoothing:antialiased; overflow-x:hidden;
    word-break:keep-all; overflow-wrap:break-word;}
  /* 은은한 분위기 글로우 */
  body::before{content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(60% 42% at 78% -8%, rgba(91,140,255,.14), transparent 70%),
      radial-gradient(46% 38% at -6% 12%, rgba(27,63,160,.07), transparent 70%);}
  ::selection{background:rgba(91,140,255,.22);}
  button{font-family:inherit;}

  /* ───── 상단 진행 ───── */
  .top{position:fixed; top:0; left:0; right:0; z-index:30;
    padding:calc(env(safe-area-inset-top) + 14px) 20px 0; display:none;}
  .top.on{display:block;}
  .trow{max-width:600px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:14px;}
  .mark{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.26em; color:var(--ink);}
  .mark i{color:var(--brand); font-style:normal;}
  .count{font-family:var(--mono); font-size:11.5px; font-weight:500; color:var(--muted-2);}
  .pbar{max-width:600px; margin:11px auto 0; height:2px; background:var(--line); border-radius:2px; overflow:hidden;}
  .pfill{height:100%; width:0%; background:linear-gradient(90deg,var(--brand),var(--brand-2)); border-radius:2px;
    transition:width .6s var(--ease);}

  /* ───── 무대 ───── */
  .scene{position:relative; z-index:1; min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:96px 20px 36px;}
  .holder{width:100%; max-width:600px; margin:auto 0;}

  /* ───── 질문 카드 ───── */
  .qcard{transition:opacity .3s var(--ease), transform .3s var(--ease);}
  .out-f{opacity:0; transform:translateY(-12px);}
  .out-b{opacity:0; transform:translateY(12px);}
  .in-f{opacity:0; transform:translateY(14px);}
  .in-b{opacity:0; transform:translateY(-14px);}
  .qhead{display:flex; align-items:center; gap:11px; margin-bottom:18px;}
  .qsec{font-family:var(--mono); font-size:11.5px; font-weight:700; letter-spacing:.16em; color:var(--brand);
    text-transform:uppercase; display:flex; align-items:center; gap:9px;}
  .qsec::before{content:""; width:18px; height:1.5px; background:var(--brand);}
  .qtext{font-size:clamp(22px,5.6vw,29px); line-height:1.34; font-weight:800; letter-spacing:-0.03em;
    margin:0 0 26px; color:var(--ink); max-width:26ch;
    word-break:keep-all; overflow-wrap:break-word; text-wrap:balance;}
  .qopt-hint{font-size:13px; color:var(--muted); margin:-16px 0 22px; font-weight:500;}

  /* 단일 선택 */
  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; align-items:center; gap:14px; width:100%; text-align:left; cursor:pointer;
    background:var(--surface); border:1.5px solid var(--line); border-radius:15px;
    padding:0 16px; min-height:60px; color:var(--ink); font-size:15.5px; font-weight:500;
    transition:border-color .16s, background .16s, box-shadow .2s, transform .12s var(--ease);}
  .opt:hover{border-color:#C3CEE6;}
  .opt:active{transform:scale(.992);}
  .opt .k{flex:0 0 auto; width:26px; height:26px; border-radius:8px; background:var(--line-2);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:12px; font-weight:700; color:var(--muted); transition:.16s;}
  .opt .t{flex:1; letter-spacing:-0.01em;}
  .opt .ck{flex:0 0 auto; width:22px; height:22px; opacity:0; transform:scale(.6); transition:.18s var(--ease);}
  .opt.sel{border-color:var(--brand); background:linear-gradient(180deg, rgba(59,107,240,.07), rgba(59,107,240,.04));
    box-shadow:0 10px 26px -14px rgba(27,63,160,.55);}
  .opt.sel .k{background:var(--brand); color:#fff;}
  .opt.sel .ck{opacity:1; transform:scale(1);}
  .opt:focus-visible{outline:none; box-shadow:0 0 0 4px rgba(27,63,160,.18);}

  /* 척도 */
  .scale{display:flex; gap:9px;}
  .scale .cell{flex:1; height:64px; border:1.5px solid var(--line); border-radius:15px; background:var(--surface);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-family:var(--mono); font-size:19px; font-weight:500; color:var(--muted);
    transition:transform .14s var(--ease), background .14s, border-color .14s, color .14s, box-shadow .18s;}
  .scale .cell:active{transform:scale(.97);}
  .scale .cell.sel{background:linear-gradient(180deg,var(--brand-2),var(--brand)); border-color:transparent; color:#fff;
    box-shadow:0 12px 26px -10px rgba(47,107,255,.6); transform:translateY(-3px);}
  .scale .cell:focus-visible{outline:none; box-shadow:0 0 0 4px rgba(27,63,160,.2);}
  .sfoot{display:flex; align-items:center; justify-content:space-between; margin-top:13px; min-height:20px;}
  .anchor{font-size:12px; color:var(--muted-2);}
  .level{font-size:13.5px; font-weight:700; color:var(--brand); opacity:0; transform:translateY(3px); transition:.2s var(--ease);}
  .level.show{opacity:1; transform:none;}

  /* NPS */
  .nps{display:grid; grid-template-columns:repeat(6,1fr); gap:8px;}
  .nps .cell{height:52px; border-radius:13px; font-size:16px;}

  /* 다중 선택 */
  .multi .opt .k{border-radius:7px;}
  .multi .opt.sel .ck{color:var(--brand);}

  /* 입력 */
  .ti,.ta{width:100%; font-family:var(--sans); color:var(--ink);
    border:none; border-bottom:2px solid var(--line); background:transparent;
    padding:8px 2px; outline:none; transition:border-color .18s;}
  .ti{font-size:21px; font-weight:600;}
  .ta{font-size:17px; font-weight:500; line-height:1.55; resize:none; min-height:96px;
    border:1.5px solid var(--line); border-radius:15px; padding:15px 16px; background:var(--surface);}
  .ti:focus,.ta:focus{border-color:var(--brand);}
  .ti::placeholder,.ta::placeholder{color:var(--muted-2); font-weight:500;}

  .otherbox{margin-top:12px; display:none;}
  .otherbox.on{display:block; animation:slidein .3s var(--ease);}
  @keyframes slidein{from{opacity:0; transform:translateY(-6px)} to{opacity:1; transform:none}}

  /* 푸터 */
  .qfoot{display:flex; align-items:center; gap:12px; margin-top:34px;}
  .spacer{flex:1;}
  .ghost{border:none; background:transparent; cursor:pointer; color:var(--muted);
    font-size:14.5px; font-weight:600; padding:11px 6px; display:flex; align-items:center; gap:7px; transition:color .15s;}
  .ghost:hover{color:var(--ink);}
  .ghost:disabled{opacity:.4; cursor:default;}
  .primary{border:none; cursor:pointer; border-radius:14px; color:#fff;
    background:linear-gradient(180deg,var(--brand-2),var(--brand)); font-size:15.5px; font-weight:700;
    letter-spacing:-0.01em; padding:14px 26px; display:inline-flex; align-items:center; gap:9px;
    box-shadow:0 12px 28px -10px rgba(27,63,160,.6); transition:transform .12s var(--ease), box-shadow .2s, opacity .2s;}
  .primary:hover{box-shadow:0 16px 34px -10px rgba(27,63,160,.72);}
  .primary:active{transform:translateY(2px);}
  .primary:disabled{opacity:.45; cursor:default; box-shadow:none;}
  .kbd{display:none;} /* 키 힌트(데스크톱) */
  @media (hover:hover) and (pointer:fine){ .kbd{display:inline-flex; margin-left:4px;
    font-family:var(--mono); font-size:10.5px; padding:2px 6px; border-radius:6px;
    background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.35);} }

  /* ───── 표지 ───── */
  .cover{transition:opacity .3s var(--ease), transform .3s var(--ease);}
  .cover .eyebrow{font-family:var(--mono); font-size:11.5px; font-weight:600; letter-spacing:.26em;
    color:var(--brand); text-transform:uppercase; margin:0 0 20px; display:flex; align-items:center; gap:11px;}
  .cover .eyebrow::before{content:""; width:26px; height:1.5px; background:var(--brand);}
  .cover h1{font-size:clamp(29px,8.2vw,44px); line-height:1.14; font-weight:800; letter-spacing:-0.04em; margin:0 0 18px; word-break:keep-all; text-wrap:balance;}
  .cover .lead{font-size:16px; color:var(--muted); margin:0 0 22px; max-width:30ch; line-height:1.6; word-break:keep-all; overflow-wrap:break-word; text-wrap:pretty;}
  .cover-assure{margin:0 0 24px; padding:14px 16px; background:var(--surface); border:1px solid var(--line);
    border-radius:14px; font-size:13px; color:var(--muted); line-height:1.62; max-width:38ch; word-break:keep-all; overflow-wrap:break-word; text-wrap:pretty;}
  .cover-assure b{color:var(--ink); font-weight:700;}
  .cnote{font-size:13px; line-height:1.55; color:var(--muted); background:var(--surface);
    border:1px solid var(--line); border-left:3px solid var(--brand); border-radius:12px;
    padding:13px 15px; margin:0 0 22px;}
  .cnote b{color:var(--ink); font-weight:700;}
  .meta{display:flex; flex-wrap:wrap; gap:9px; margin-bottom:30px;}
  .chip{display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; color:var(--ink-2);
    background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:9px 14px;}
  .chip svg{flex:0 0 auto;}
  .start{border:none; cursor:pointer; border-radius:16px; color:#fff;
    background:linear-gradient(180deg,var(--brand-2),var(--brand)); font-size:17px; font-weight:700;
    padding:18px 30px; display:inline-flex; align-items:center; gap:11px;
    box-shadow:0 18px 40px -12px rgba(27,63,160,.66); transition:transform .12s var(--ease), box-shadow .2s;}
  .start:hover{box-shadow:0 22px 48px -12px rgba(27,63,160,.78);}
  .start:active{transform:translateY(2px);}

  /* 선택(재직/퇴직) */
  .pick{display:flex; align-items:center; gap:16px; width:100%; text-align:left; cursor:pointer;
    background:var(--surface); border:1.5px solid var(--line); border-radius:18px; padding:22px 20px;
    margin-bottom:13px; transition:border-color .16s, transform .12s var(--ease), box-shadow .2s;}
  .pick:hover{border-color:var(--brand); box-shadow:0 18px 38px -18px rgba(27,63,160,.5);}
  .pick:active{transform:scale(.99);}
  .pick .pi{font-family:var(--mono); font-size:13px; font-weight:700; color:var(--brand);}
  .pick .pb{flex:1;}
  .pick .pb b{display:block; font-size:17.5px; font-weight:700; letter-spacing:-0.02em; margin-bottom:3px;}
  .pick .pb span{font-size:13px; color:var(--muted);}
  .pick .ar{color:var(--muted-2); transition:transform .18s var(--ease), color .18s;}
  .pick:hover .ar{color:var(--brand); transform:translateX(4px);}

  /* ───── 완료 ───── */
  .done{text-align:center; max-width:30ch; margin:auto; transition:opacity .3s var(--ease), transform .3s var(--ease);}
  .cw{width:88px; height:88px; margin:0 auto 28px;}
  .cw svg{width:100%; height:100%;}
  .cw circle{fill:none; stroke:var(--mint); stroke-width:3; stroke-dasharray:151; stroke-dashoffset:151;
    animation:draw .6s .05s var(--ease) forwards;}
  .cw path{fill:none; stroke:var(--mint); stroke-width:3.4; stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:46; stroke-dashoffset:46; animation:draw .42s .52s var(--ease) forwards;}
  @keyframes draw{to{stroke-dashoffset:0}}
  .done h2{font-size:26px; font-weight:800; letter-spacing:-0.035em; margin:0 0 12px;}
  .done p{font-size:15px; color:var(--muted); margin:0; line-height:1.62;}

  .err{color:#C0392B; font-size:13.5px; text-align:center; margin-top:14px; min-height:18px;}
  .foot{position:relative; z-index:1; text-align:center; font-size:11px; color:var(--muted-2);
    padding:0 20px 26px; letter-spacing:-0.004em;}
  .foot b{font-family:var(--mono); font-weight:500; letter-spacing:.1em;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
    .cw circle,.cw path{stroke-dashoffset:0; animation:none;}
  }
  @media (max-width:380px){
    .scale .cell{height:58px; font-size:17px;} .nps .cell{height:46px;}
    .opt{min-height:56px;}
  }
</style>
</head>
<body>

<!-- 진행 -->
<div class="top" id="top">
  <div class="trow"><span class="mark">ANGEL<i>·</i>STAFF</span><span class="count" id="count"></span></div>
  <div class="pbar"><div class="pfill" id="pfill"></div></div>
</div>

<main class="scene">
  <div class="holder" id="holder"></div>
</main>
<div class="foot"><b>ANGEL STAFF</b> · 응답은 사업장 운영 개선 목적으로만 사용됩니다</div>

<script>
/* ====================================================================
   설정: 배포 후 발급받은 Apps Script 웹앱 URL(.../exec)을 붙여넣으세요.

var WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyVY_dJzA3PB_sqfiywazW8hIhbg38JJD3f1SZ2xuSrKnWqUiK340ugGQ3QDJ9drrfYvg/exec";

/* ▼▼▼ 이 한 줄만 병원에 맞게 바꾸면 됩니다 ▼▼▼ */
var FIXED_HOSPITAL = "의정부성모병원";
/* ▲▲▲ (예: "강동성심병원" / "강남하트스캔의원" / "의정부성모병원") ▲▲▲ */
var HOSPITALS = [FIXED_HOSPITAL];
var TENURES   = ["3개월 미만","3~6개월","6개월~1년","1~2년","2년 이상"];
var EMPTYPES  = ["파견","도급(위탁)"];
var REASONS   = ["급여·수당","근무 강도·교대","현장 인간관계","통근 거리","계약 만료","정규직 전환 기회 없음","건강 문제","타 직장 이직","개인 사정","기타"];
var LEVELS    = ["","매우 불만족","불만족","보통","만족","매우 만족"];

/* 질문 정의 — key/formType은 이전 버전과 동일하므로 Code.gs 수정 불필요 */
function scale(key,q){ return {key:key, type:"scale", sec:"근무 만족도", q:q, required:true, anchors:["매우 불만족","매우 만족"]}; }
function scaleX(key,q){ return {key:key, type:"scale", sec:"만족도 회고", q:q, required:true, anchors:["매우 불만족","매우 만족"]}; }

var FLOWS = {
  resident: {
    cover:{ eyebrow:"재직자 · 근무 환경 조사", title:"당신의 목소리가\n현장을 바꿉니다",
      lead:"지금 근무 환경에 대한 솔직한 생각을 들려주세요.",
      assure:"<b>정확한 집계를 위해 이름을 작성해 주세요.</b> 응답은 비밀이 보장되며, 인사·운영 개선 목적으로만 사용되고 현장(병원)·동료에게 개인 응답이 공개되지 않습니다.",
      chips:[["⏱","약 2분 소요"],["🔒","비밀 보장"]] },
    done:"소중한 의견 고맙습니다.\n더 나은 근무 환경을 만드는 데 그대로 반영하겠습니다.",
    q:[
      {key:"name", type:"text", sec:"응답자 정보", q:"성함을 작성해 주세요", required:true, placeholder:"실명을 입력해 주세요"},
      {key:"tenure", type:"choice", sec:"응답자 정보", q:"근무하신 기간은 얼마나 되나요?", required:true, options:TENURES},
      {key:"empType", type:"choice", sec:"응답자 정보", q:"고용형태를 알려주세요", required:true, options:EMPTYPES},
      {key:"dept", type:"text", sec:"응답자 정보", q:"담당 부서·직무를 알려주세요", required:true, placeholder:"예: 중환자실, 외래, 병동 보조"},
      scale("q_pay","급여와 수당 수준에 얼마나 만족하시나요?"),
      scale("q_payAccuracy","급여가 정확하고 제때 지급되는 편인가요?"),
      scale("q_workload","근무 강도와 교대 일정은 어떠신가요?"),
      scale("q_rest","휴게 시간과 휴가 사용은 어떠신가요?"),
      scale("q_siteManager","병원 현장 관리자와의 관계는 어떠신가요?"),
      scale("q_companySupport","엔젤스태프 담당자의 지원·소통은 어떠신가요?"),
      scale("q_environment","업무 환경과 안전은 어떠신가요?"),
      scale("q_grievance","불만을 제기했을 때 처리 과정은 어떠신가요?"),
      scale("q_overall","전반적으로 지금 일자리에 얼마나 만족하시나요?"),
      {key:"turnoverIntent", type:"choice", sec:"이직·추천", q:"최근 이직을 얼마나 고려하셨나요?", required:true,
        options:["전혀 없음","가끔 있음","자주 있음","늘 생각함"]},
      {key:"enps", type:"nps", sec:"이직·추천", q:"이 일자리를 동료에게 추천하시겠어요?", required:true, anchors:["전혀 아니다","매우 그렇다"]},
      {key:"improve", type:"longtext", sec:"자유 의견", q:"가장 개선이 필요한 한 가지는 무엇인가요?", optional:true, placeholder:"가장 바뀌었으면 하는 점을 적어 주세요."},
      {key:"freeNote", type:"longtext", sec:"자유 의견", q:"마지막으로, 회사나 현장에 바라는 점이 있다면 들려주세요", optional:true, placeholder:"자유롭게 적어 주세요. (선택)"}
    ]
  },
  exit: {
    cover:{ eyebrow:"퇴직자 · 근무 경험 인터뷰", title:"그동안의 경험을\n들려주세요",
      lead:"근무 경험과 퇴직 사유는 사업장을 개선하는 데 쓰입니다.",
      assure:"<b>정확한 집계를 위해 이름을 작성해 주세요.</b> 응답은 비밀이 보장되며, 인사·운영 개선 목적으로만 사용되고 현장(병원)·동료에게 개인 응답이 공개되지 않습니다.",
      chips:[["⏱","약 2분 소요"],["🔒","비밀 보장"]] },
    done:"그동안 함께해 주셔서 고맙습니다.\n남겨주신 의견은 소중히 반영하겠습니다.",
    q:[
      {key:"name", type:"text", sec:"응답자 정보", q:"성함을 작성해 주세요", required:true, placeholder:"실명을 입력해 주세요"},
      {key:"tenure", type:"choice", sec:"응답자 정보", q:"총 근속 기간이 얼마나 되나요?", required:true, options:TENURES},
      {key:"empType", type:"choice", sec:"응답자 정보", q:"고용형태를 알려주세요", required:true, options:EMPTYPES},
      {key:"dept", type:"text", sec:"응답자 정보", q:"담당 부서·직무를 알려주세요", required:true, placeholder:"예: 린넨실, 원무, 병동 보조"},
      {key:"primaryReason", type:"choice", sec:"퇴직 사유", q:"퇴직을 결정한 가장 큰 이유는 무엇인가요?", required:true, options:REASONS},
      {key:"factors", type:"multi", sec:"퇴직 사유", q:"그 밖에 영향을 준 요인을 모두 골라 주세요", optional:true, options:REASONS},
      scaleX("q_pay","근무하실 때 급여와 수당은 어떠셨나요?"),
      scaleX("q_workload","근무 강도와 교대 일정은 어떠셨나요?"),
      scaleX("q_siteManager","현장 관리자와의 관계는 어떠셨나요?"),
      scaleX("q_companySupport","엔젤스태프 담당자의 지원은 어떠셨나요?"),
      scaleX("q_overall","전반적으로 그때 일자리에 얼마나 만족하셨나요?"),
      {key:"rehire", type:"choice", sec:"재입사·기타", q:"기회가 된다면 다시 함께 일하실 의향이 있으신가요?", required:true,
        options:["예","조건부 가능","아니오"]},
      {key:"couldRetain", type:"longtext", sec:"재입사·기타", q:"회사가 무엇을 했다면 계속 근무하셨을까요?", optional:true, placeholder:"솔직하게 들려주세요. (선택)"},
      {key:"freeNote", type:"longtext", sec:"재입사·기타", q:"마지막으로, 남기고 싶은 말이 있다면 들려주세요", optional:true, placeholder:"자유롭게 적어 주세요. (선택)"}
    ]
  }
};

var CODE2HOSP = { gd:"강동성심병원", uj:"의정부성모병원", gn:"강남하트스캔의원" };
var S = { type:null, i:0, flow:[], answers:{}, otherPending:false, locked:false, lockHospital:null };
var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function $(id){ return document.getElementById(id); }
function E(t,c,h){ var e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; }
function nbDot(s){ return String(s).replace(/([·・])/g, "\u2060$1\u2060"); }
function letters(i){ return ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"][i] || (i+1); }

/* ───── 화면 전환 ───── */
function swap(node, dir){
  var h=$("holder");
  if(reduce || !h.firstChild){ h.innerHTML=""; h.appendChild(node); syncFoot(); return; }
  var old=h.firstChild;
  old.classList.add(dir==="back"?"out-b":"out-f");
  setTimeout(function(){
    h.innerHTML=""; node.classList.add(dir==="back"?"in-b":"in-f"); h.appendChild(node); syncFoot();
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ node.classList.remove("in-b","in-f"); }); });
  },210);
}

/* ───── 표지 / 선택 ───── */
function showChooser(){
  $("top").classList.remove("on");
  var c=E("div","cover");
  c.innerHTML='<p class="eyebrow">근무 환경 조사</p>'
    +'<h1>당신의 목소리가<br>현장을 바꿉니다</h1>'
    +'<p class="lead">해당하는 쪽을 선택해 주세요. 응답은 2분이면 충분합니다.</p>';
  var p1=E("button","pick"); p1.type="button";
  p1.innerHTML='<span class="pi">01</span><span class="pb"><b>재직 중입니다</b><span>현재 근무 중인 분을 위한 만족도 조사</span></span><svg class="ar" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10h11M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  p1.onclick=function(){ showCover("resident"); };
  var p2=E("button","pick"); p2.type="button";
  p2.innerHTML='<span class="pi">02</span><span class="pb"><b>퇴직했습니다</b><span>함께해 주신 분을 위한 인터뷰</span></span><svg class="ar" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10h11M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  p2.onclick=function(){ showCover("exit"); };
  c.appendChild(p1); c.appendChild(p2);
  swap(c,"fwd");
}

function showCover(type){
  S.type=type; S.flow=FLOWS[type].q;
  S.answers={};
  if(window.__PRESET_HOSPITAL && HOSPITALS.indexOf(window.__PRESET_HOSPITAL)>=0){ S.answers.hospital=window.__PRESET_HOSPITAL; }
  $("top").classList.remove("on");
  var cv=FLOWS[type].cover;
  var c=E("div","cover");
  var chips=[["🏥",FIXED_HOSPITAL]].concat(cv.chips).map(function(ch){ return '<span class="chip">'+ch[0]+' '+ch[1]+'</span>'; }).join("");
  c.innerHTML='<p class="eyebrow">'+nbDot(cv.eyebrow)+'</p>'
    +'<h1>'+nbDot(cv.title).replace(/\n/g,"<br>")+'</h1>'
    +'<p class="lead">'+nbDot(cv.lead)+'</p>'
    +'<div class="cover-assure">'+nbDot(cv.assure)+'</div>'
    +'<div class="meta">'+chips+'</div>';
  var b=E("button","start"); b.type="button";
  b.innerHTML='시작하기 <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M4 10h11M11 5l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  b.onclick=function(){ S.i=0; render("fwd"); };
  c.appendChild(b);
  swap(c, "fwd");
}

/* ───── 질문 렌더 ───── */
function render(dir){
  var q=S.flow[S.i], total=S.flow.length;
  S.otherPending=false; S.locked=false;
  $("top").classList.add("on");
  $("count").textContent=("0"+(S.i+1)).slice(-2)+" / "+("0"+total).slice(-2);
  $("pfill").style.width=(total>1? S.i/(total-1)*100 : 0)+"%";

  var card=E("div","qcard");
  var head=E("div","qhead","<span class=\"qsec\">"+nbDot(q.sec)+"</span>");
  card.appendChild(head);
  card.appendChild(E("h2","qtext",nbDot(q.q)));

  var body=E("div","qbody");
  if(q.type==="choice") buildChoice(body,q);
  else if(q.type==="scale"||q.type==="nps") buildScale(body,q);
  else if(q.type==="multi") buildMulti(body,q);
  else if(q.type==="text"||q.type==="longtext") buildInput(body,q);
  card.appendChild(body);

  card.appendChild(buildFoot(q));
  swap(card, dir);
}

function buildChoice(body,q){
  var hint = q.optional ? '<p class="qopt-hint">선택하지 않고 넘어갈 수 있어요.</p>' : '';
  body.insertAdjacentHTML("beforeend", hint);
  var box=E("div","opts");
  q.options.forEach(function(o,idx){
    var b=E("button","opt"+(S.answers[q.key]===o?" sel":"")); b.type="button"; b.dataset.val=o;
    b.innerHTML='<span class="k">'+(idx+1)+'</span><span class="t">'+nbDot(o)+'</span>'
      +'<svg class="ck" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="10" fill="#1B3FA0"/><path d="M6.5 11.2l3 3 6-6.4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    b.onclick=function(){ pickChoice(q,o,b); };
    box.appendChild(b);
  });
  body.appendChild(box);
  // 기타 입력칸
  if(q.otherKey){
    var ob=E("div","otherbox"); ob.id="otherbox";
    ob.innerHTML='<input class="ti" id="otherInput" type="text" placeholder="병원명을 입력해 주세요">';
    body.appendChild(ob);
    var inp=ob.querySelector("#otherInput");
    inp.addEventListener("input",function(){ S.answers[q.key]=inp.value.trim(); syncFoot(); });
    // 뒤로 돌아왔을 때, 목록에 없는 값이면 '기타' 입력으로 복원
    var cur=S.answers[q.key];
    if(cur && q.options.indexOf(cur)<0){
      var etcBtn=box.querySelector('[data-val="기타"]');
      if(etcBtn) etcBtn.classList.add("sel");
      ob.classList.add("on"); inp.value=cur; S.otherPending=true;
    }
  }
}

function pickChoice(q,val,btn){
  if(S.locked) return;
  Array.prototype.forEach.call(btn.parentNode.children,function(c){ c.classList.remove("sel"); });
  btn.classList.add("sel");
  if(q.otherKey && val==="기타"){
    S.otherPending=true; S.answers[q.key]="";
    var ob=$("otherbox"); if(ob){ ob.classList.add("on"); var inp=$("otherInput"); if(inp){ inp.focus(); } }
    syncFoot(); return;
  }
  S.otherPending=false; var ob2=$("otherbox"); if(ob2) ob2.classList.remove("on");
  S.answers[q.key]=val; S.locked=true; syncFoot();
  advance();
}

function buildScale(body,q){
  var max = q.type==="nps" ? 10 : 5;
  var start = q.type==="nps" ? 0 : 1;
  var box=E("div", q.type==="nps"?"nps":"scale");
  for(var n=start;n<=max;n++){
    (function(n){
      var c=E("div","cell"+(S.answers[q.key]==String(n)?" sel":"")); c.tabIndex=0; c.dataset.val=n; c.textContent=n;
      c.onclick=function(){ pickScale(q,n,c); };
      c.onkeydown=function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); pickScale(q,n,c); } };
      box.appendChild(c);
    })(n);
  }
  body.appendChild(box);
  var foot=E("div","sfoot");
  var lv = q.type==="scale" ? '<span class="level" id="level"></span>' : '<span></span>';
  foot.innerHTML='<span class="anchor">'+q.anchors[0]+'</span>'+lv+'<span class="anchor">'+q.anchors[1]+'</span>';
  body.appendChild(foot);
}

function pickScale(q,n,cell){
  if(S.locked) return;
  Array.prototype.forEach.call(cell.parentNode.children,function(c){ c.classList.remove("sel"); });
  cell.classList.add("sel");
  S.answers[q.key]=String(n); S.locked=true;
  if(q.type==="scale"){ var lv=$("level"); if(lv){ lv.textContent=LEVELS[n]; lv.classList.add("show"); } }
  syncFoot();
  advance(q.type==="scale"?470:330);
}

function buildMulti(body,q){
  body.insertAdjacentHTML("beforeend",'<p class="qopt-hint">해당하는 것을 모두 선택하세요. (선택)</p>');
  if(!Array.isArray(S.answers[q.key])) S.answers[q.key]=[];
  var sel=S.answers[q.key];
  var box=E("div","opts multi");
  q.options.forEach(function(o,idx){
    var on=sel.indexOf(o)>=0;
    var b=E("button","opt"+(on?" sel":"")); b.type="button";
    b.innerHTML='<span class="k">'+(idx+1)+'</span><span class="t">'+nbDot(o)+'</span>'
      +'<svg class="ck" viewBox="0 0 22 22" fill="none"><rect x="1" y="1" width="20" height="20" rx="6" fill="#1B3FA0"/><path d="M6.5 11.2l3 3 6-6.4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    b.onclick=function(){
      var p=sel.indexOf(o);
      if(p>=0){ sel.splice(p,1); b.classList.remove("sel"); } else { sel.push(o); b.classList.add("sel"); }
      syncFoot();
    };
    box.appendChild(b);
  });
  body.appendChild(box);
}

function buildInput(body,q){
  if(q.type==="text"){
    var i=E("input","ti"); i.id="inp"; i.type="text"; if(q.placeholder)i.placeholder=q.placeholder;
    if(S.answers[q.key]) i.value=S.answers[q.key];
    i.addEventListener("input",function(){ S.answers[q.key]=i.value.trim(); syncFoot(); });
    body.appendChild(i);
  } else {
    var t=E("textarea","ta"); t.id="inp"; if(q.placeholder)t.placeholder=q.placeholder;
    if(S.answers[q.key]) t.value=S.answers[q.key];
    t.addEventListener("input",function(){ S.answers[q.key]=t.value.trim(); syncFoot(); });
    body.appendChild(t);
  }
}

/* ───── 푸터 ───── */
function isAuto(t){ return t==="choice"||t==="scale"||t==="nps"; }
function answered(q){
  var v=S.answers[q.key];
  if(q.type==="multi") return Array.isArray(v)&&v.length>0;
  if(q.otherKey && S.otherPending) return !!(v&&String(v).trim());
  return v!==undefined && v!==null && String(v).length>0;
}
function buildFoot(q){
  var f=E("div","qfoot"); f.id="qfoot";
  var back=E("button","ghost"); back.type="button"; back.id="backBtn";
  back.innerHTML='<svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M16 10H5M9 5l-5 5 5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> 이전';
  back.onclick=goBack;
  f.appendChild(back);
  f.appendChild(E("div","spacer"));
  var skip=E("button","ghost"); skip.type="button"; skip.id="skipBtn"; skip.textContent="건너뛰기"; skip.onclick=goNext;
  f.appendChild(skip);
  var prim=E("button","primary"); prim.type="button"; prim.id="primBtn";
  prim.onclick=goNext;
  f.appendChild(prim);
  prim.style.display="none"; skip.style.display="none";
  back.style.visibility = S.i>0 ? "visible":"hidden";
  return f;
}
function syncFoot(){
  var q=S.flow[S.i], last=S.i===S.flow.length-1;
  var back=$("backBtn"), skip=$("skipBtn"), prim=$("primBtn");
  if(!prim) return;
  back.style.visibility = S.i>0 ? "visible":"hidden";

  var manual = !isAuto(q.type) || S.otherPending;
  var autoDone = isAuto(q.type) && answered(q) && !S.locked && !S.otherPending;
  var showPrim = manual || last || autoDone;
  var showSkip = q.optional && isAuto(q.type) && !last && !S.otherPending && !answered(q);

  prim.style.display = showPrim ? "inline-flex":"none";
  skip.style.display = showSkip ? "inline-flex":"none";

  if(showPrim){
    prim.innerHTML = last
      ? '제출하기 <svg width="17" height="17" viewBox="0 0 20 20" fill="none"><path d="M3 10.5l4 4 10-10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : '다음 <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M4 10h11M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="kbd">↵</span>';
    var ok = q.required ? answered(q) : true;
    if(S.otherPending) ok = answered(q);
    prim.disabled = !ok;
  }
}

/* ───── 이동 ───── */
function advance(delay){
  setTimeout(function(){
    if(S.i>=S.flow.length-1){ submit(); }
    else { S.i++; render("fwd"); }
  }, reduce?0:(delay||330));
}
function goNext(){
  var q=S.flow[S.i];
  if(q.required && !answered(q)) return;
  if(S.i>=S.flow.length-1){ submit(); return; }
  S.i++; render("fwd");
}
function goBack(){ if(S.i<=0){ showCover(S.type); return; } S.i--; render("back"); }

/* ───── 제출 ───── */
function submit(){
  var payload={ formType:S.type, hospital:FIXED_HOSPITAL };
  S.flow.forEach(function(q){
    var v=S.answers[q.key];
    payload[q.key] = (v===undefined||v===null) ? (q.type==="multi"?[]:"") : v;
  });
  showSending();
  fetch(WEB_APP_URL,{method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload)})
    .then(showDone)
    .catch(function(){ showError(); });
}
function showSending(){
  $("top").classList.remove("on");
  var c=E("div","done");
  c.innerHTML='<div class="cw"><svg viewBox="0 0 56 56"><circle cx="28" cy="28" r="24" style="animation:none;stroke:#C7D2EA"/></svg></div><h2>보내는 중…</h2><p>잠시만 기다려 주세요.</p>';
  swap(c,"fwd");
}
function showDone(){
  if(WEB_APP_URL.indexOf("PASTE_")===0){ showError("(설정 필요) 코드 상단의 WEB_APP_URL을 먼저 입력하세요."); return; }
  var c=E("div","done");
  c.innerHTML='<div class="cw"><svg viewBox="0 0 56 56"><circle cx="28" cy="28" r="24"/><path d="M17 29l7.5 7.5L40 21"/></svg></div>'
    +'<h2>응답을 받았습니다</h2><p>'+FLOWS[S.type].done.replace(/\n/g,"<br>")+'</p>';
  swap(c,"fwd");
}
function showError(msg){
  var c=E("div","done");
  c.innerHTML='<h2>전송에 실패했습니다</h2><p>'+(msg||"인터넷 연결을 확인하고 다시 시도해 주세요.")+'</p>';
  var b=E("button","start"); b.type="button"; b.style.marginTop="22px"; b.textContent="다시 시도";
  b.onclick=function(){ render("fwd"); };
  c.appendChild(b);
  swap(c,"fwd");
}

/* ───── 키보드 ───── */
document.addEventListener("keydown",function(e){
  if(!S.type || !$("primBtn")) return;
  var tag=(document.activeElement&&document.activeElement.tagName)||"";
  var typing = tag==="INPUT"||tag==="TEXTAREA";
  var q=S.flow[S.i];
  if((e.key==="Enter") && !typing){ var p=$("primBtn"); if(p && p.style.display!=="none" && !p.disabled){ e.preventDefault(); goNext(); } return; }
  if(e.key==="Enter" && typing && tag==="INPUT"){ var p2=$("primBtn"); if(p2 && p2.style.display!=="none" && !p2.disabled){ e.preventDefault(); goNext(); } return; }
  if(typing) return;
  if(/^[0-9]$/.test(e.key) && q && (q.type==="choice"||q.type==="scale"||q.type==="nps"||q.type==="multi")){
    var holder=$("holder"); var cells;
    if(q.type==="scale"||q.type==="nps") cells=holder.querySelectorAll(".cell"); else cells=holder.querySelectorAll(".opt");
    var num=parseInt(e.key,10);
    var idx = (q.type==="nps") ? num : num-1;
    if(cells[idx]){ e.preventDefault(); cells[idx].click(); }
  }
});

/* ───── 시작 ───── */
(function init(){
  var params=new URLSearchParams(location.search);
  var p=params.get("type"), h=params.get("h");
  if(h){ var _h=h.trim(); window.__PRESET_HOSPITAL = CODE2HOSP[_h] || _h; }
  if(p==="resident"||p==="exit"){ showCover(p); }
  else { showChooser(); }
})();
</script>
</body>
